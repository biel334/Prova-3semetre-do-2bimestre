services:
  db:
    image: postgres:17
    container_name: escola-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: escola
    ports:
      - "5433:5432"   # porta diferente da API (5432), evita conflito se os dois subirem juntos
    volumes:
      - escola-db-data:/var/lib/postgresql/data
      - ./escola.sql:/docker-entrypoint-initdb.d/01-escola.sql:ro
      - ./scripts/seed/seed_extra.sql:/docker-entrypoint-initdb.d/02-seed-extra.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  escola-db-data: