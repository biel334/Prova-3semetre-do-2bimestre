services:

  postgres-container:
    image: postgres:17-alpine
    container_name: postgres-container
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-api_rest_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend-network

  redis-container:
    image: redis:7-alpine
    container_name: redis-container
    restart: always
    volumes:
      - redisdata:/data
    networks:
      - backend-network

  node-container:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: node-container
    restart: always
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres-container
      REDIS_HOST: redis-container
    depends_on:
      - postgres-container
      - redis-container
    networks:
      - backend-network
      - frontend-network

  nginx-container:
    image: nginx:1.27-alpine
    container_name: nginx-container
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - node-container
    networks:
      - frontend-network

networks:
  backend-network:
    driver: bridge
    name: backend-network
  frontend-network:
    driver: bridge
    name: frontend-network

volumes:
  pgdata:
    name: pgdata
  redisdata:
    name: redisdata